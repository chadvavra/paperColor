<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>PaperColor ToDo</title>
  <style>
    /* ── Reset & base ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:    #1a73e8;
      --green:   #34a853;
      --red:     #ea4335;
      --yellow:  #fbbc04;
      --surface: #f8f9fa;
      --card:    #ffffff;
      --border:  #e0e0e0;
      --text:    #202124;
      --muted:   #5f6368;
      --radius:  12px;
      --shadow:  0 1px 3px rgba(0,0,0,.12), 0 1px 2px rgba(0,0,0,.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--surface);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 120px; /* room for FAB */
    }

    /* ── Header ──────────────────────────────────────── */
    header {
      background: var(--blue);
      color: white;
      padding: 16px 20px 14px;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 { font-size: 1.2rem; font-weight: 600; flex: 1; }

    #status-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--red);
      flex-shrink: 0;
      transition: background .3s;
    }
    #status-dot.connected { background: var(--green); }

    #connect-btn {
      background: rgba(255,255,255,.2);
      color: white;
      border: 1px solid rgba(255,255,255,.5);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: .85rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .2s;
    }
    #connect-btn:hover { background: rgba(255,255,255,.3); }
    #connect-btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Stats bar ───────────────────────────────────── */
    #stats {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      gap: 20px;
      font-size: .85rem;
      color: var(--muted);
    }
    #stats span b { color: var(--text); }

    /* ── Todo list ───────────────────────────────────── */
    #todo-list {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { font-size: 1rem; margin-bottom: 6px; }
    .empty-state small { font-size: .85rem; }

    /* ── Todo card ───────────────────────────────────── */
    .todo-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 14px;
      transition: opacity .2s, transform .15s;
      animation: slideIn .2s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .todo-card.done { opacity: .65; }

    .todo-card input[type=checkbox] {
      width: 22px; height: 22px;
      flex-shrink: 0;
      accent-color: var(--green);
      cursor: pointer;
    }

    .todo-text {
      flex: 1;
      font-size: 1rem;
      line-height: 1.4;
      word-break: break-word;
    }
    .todo-card.done .todo-text {
      text-decoration: line-through;
      color: var(--muted);
    }

    .todo-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }
    .icon-btn {
      background: none;
      border: none;
      border-radius: 50%;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 1.1rem;
      color: var(--muted);
      transition: background .15s, color .15s;
    }
    .icon-btn:hover { background: var(--surface); color: var(--text); }
    .icon-btn.delete:hover { background: #fce8e6; color: var(--red); }

    /* ── Add panel (bottom sheet) ────────────────────── */
    #add-panel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: white;
      border-top: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      padding: 16px 16px 32px;
      box-shadow: 0 -4px 20px rgba(0,0,0,.12);
      z-index: 200;
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.4,0,.2,1);
    }
    #add-panel.open { transform: translateY(0); }

    #add-panel h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 14px;
      color: var(--muted);
      text-align: center;
    }

    .add-input-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #todo-input {
      flex: 1;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
      background: var(--surface);
    }
    #todo-input:focus { border-color: var(--blue); background: white; }

    #voice-btn {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: none;
      background: var(--surface);
      color: var(--muted);
      font-size: 1.4rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, color .2s, transform .1s;
      flex-shrink: 0;
    }
    #voice-btn.listening {
      background: #fce8e6;
      color: var(--red);
      animation: pulse 1s ease infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.1); }
    }

    #send-btn {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: none;
      background: var(--blue);
      color: white;
      font-size: 1.3rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
      flex-shrink: 0;
    }
    #send-btn:hover { background: #1557b0; }
    #send-btn:disabled { background: var(--border); cursor: not-allowed; }

    /* ── FAB (floating action button) ───────────────── */
    #fab {
      position: fixed;
      bottom: 24px; right: 24px;
      width: 58px; height: 58px;
      border-radius: 50%;
      background: var(--blue);
      color: white;
      border: none;
      font-size: 1.8rem;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(26,115,232,.4);
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, transform .15s;
      z-index: 150;
    }
    #fab:hover { background: #1557b0; transform: scale(1.05); }
    #fab.open  { background: var(--muted); transform: rotate(45deg); }

    /* ── Toast ───────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 90px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #323232;
      color: white;
      padding: 10px 20px;
      border-radius: 24px;
      font-size: .9rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s, transform .3s;
      z-index: 300;
      white-space: nowrap;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Overlay ─────────────────────────────────────── */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.3);
      z-index: 190;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
    }
    #overlay.visible { opacity: 1; pointer-events: all; }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────── -->
<header>
  <div id="status-dot"></div>
  <h1>PaperColor ToDo</h1>
  <button id="connect-btn" onclick="toggleConnect()">Connect</button>
</header>

<!-- ── Stats ───────────────────────────────────────────── -->
<div id="stats">
  <span><b id="stat-total">0</b> tasks</span>
  <span><b id="stat-done">0</b> done</span>
  <span><b id="stat-left">0</b> remaining</span>
</div>

<!-- ── Todo list ───────────────────────────────────────── -->
<div id="todo-list">
  <div class="empty-state" id="empty-msg">
    <div class="icon">📋</div>
    <p>No tasks yet.</p>
    <small>Tap <b>+</b> to add one, or connect to your PaperColor.</small>
  </div>
</div>

<!-- ── Overlay ─────────────────────────────────────────── -->
<div id="overlay" onclick="closePanel()"></div>

<!-- ── FAB ─────────────────────────────────────────────── -->
<button id="fab" onclick="togglePanel()">+</button>

<!-- ── Add panel ───────────────────────────────────────── -->
<div id="add-panel">
  <h3>Add Task</h3>
  <div class="add-input-row">
    <button id="voice-btn" onclick="toggleVoice()" title="Voice input">🎤</button>
    <input id="todo-input" type="text" placeholder="What needs to be done?"
           maxlength="60"
           onkeydown="if(event.key==='Enter') sendTodo()" />
    <button id="send-btn" onclick="sendTodo()">➤</button>
  </div>
</div>

<!-- ── Toast ───────────────────────────────────────────── -->
<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════
//  BLE Configuration  (must match Arduino sketch)
// ══════════════════════════════════════════════════════════
const BLE_NAME   = 'PaperColor-ToDo';
const SVC_UUID   = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
const RX_UUID    = '6e400002-b5a3-f393-e0a9-e50e24dcca9e'; // web → device
const TX_UUID    = '6e400003-b5a3-f393-e0a9-e50e24dcca9e'; // device → web

// ══════════════════════════════════════════════════════════
//  State
// ══════════════════════════════════════════════════════════
let bleDevice   = null;
let bleServer   = null;
let rxChar      = null;
let txChar      = null;
let connected   = false;

let todos       = [];             // local mirror of device state
let jsonBuf     = '';             // accumulates fragmented BLE notifications

// ══════════════════════════════════════════════════════════
//  BLE — connect / disconnect
// ══════════════════════════════════════════════════════════
async function toggleConnect() {
  if (connected) {
    disconnect();
  } else {
    await connect();
  }
}

async function connect() {
  if (!navigator.bluetooth) {
    toast('Web Bluetooth not supported. Use Chrome on Android.');
    return;
  }
  const btn = document.getElementById('connect-btn');
  btn.disabled = true;
  btn.textContent = 'Connecting…';

  try {
    bleDevice = await navigator.bluetooth.requestDevice({
      filters: [
        { services: [SVC_UUID] },        // primary filter — matches on service UUID in advert
        { name: BLE_NAME }               // fallback name filter
      ],
      optionalServices: [SVC_UUID]
    });

    bleDevice.addEventListener('gattserverdisconnected', onDisconnected);

    bleServer = await bleDevice.gatt.connect();
    const svc = await bleServer.getPrimaryService(SVC_UUID);

    rxChar = await svc.getCharacteristic(RX_UUID);
    txChar = await svc.getCharacteristic(TX_UUID);

    await txChar.startNotifications();
    txChar.addEventListener('characteristicvaluechanged', onNotify);

    onConnected();
    await sendCommand('SYNC');

  } catch (err) {
    console.error(err);
    toast('Connection failed: ' + err.message);
    btn.disabled = false;
    btn.textContent = 'Connect';
  }
}

function disconnect() {
  if (bleDevice && bleDevice.gatt.connected) {
    bleDevice.gatt.disconnect();
  }
  onDisconnected();
}

function onConnected() {
  connected = true;
  const dot = document.getElementById('status-dot');
  dot.classList.add('connected');
  const btn = document.getElementById('connect-btn');
  btn.textContent = 'Disconnect';
  btn.disabled = false;
  toast('Connected to PaperColor ✓');
}

function onDisconnected() {
  connected = false;
  rxChar = txChar = bleServer = null;
  const dot = document.getElementById('status-dot');
  dot.classList.remove('connected');
  const btn = document.getElementById('connect-btn');
  btn.textContent = 'Connect';
  btn.disabled = false;
  toast('Disconnected');
}

// ══════════════════════════════════════════════════════════
//  BLE — send command to device
// ══════════════════════════════════════════════════════════
async function sendCommand(cmd) {
  if (!connected || !rxChar) {
    toast('Not connected to PaperColor');
    return false;
  }
  try {
    const enc = new TextEncoder();
    await rxChar.writeValueWithoutResponse(enc.encode(cmd));
    console.log('CMD sent:', cmd);
    return true;
  } catch (err) {
    console.error('BLE write error:', err);
    toast('Send failed — reconnect and try again');
    return false;
  }
}

// ══════════════════════════════════════════════════════════
//  BLE — receive notifications from device (JSON todo list)
//  NimBLE may fragment large JSON across multiple notifications.
//  We accumulate until we have valid JSON.
// ══════════════════════════════════════════════════════════
function onNotify(event) {
  const chunk = new TextDecoder().decode(event.target.value);
  jsonBuf += chunk;

  // Try to parse — if JSON is complete it will succeed
  try {
    const data = JSON.parse(jsonBuf);
    jsonBuf = '';                 // clear buffer
    if (Array.isArray(data.todos)) {
      todos = data.todos;
      renderTodos();
    }
  } catch (_) {
    // Incomplete JSON — wait for the next chunk
  }
}

// ══════════════════════════════════════════════════════════
//  Render todo list
// ══════════════════════════════════════════════════════════
function renderTodos() {
  const list    = document.getElementById('todo-list');
  const emptyEl = document.getElementById('empty-msg');

  // Remove existing cards (not the empty message)
  Array.from(list.querySelectorAll('.todo-card')).forEach(c => c.remove());

  const done  = todos.filter(t => t.done).length;
  const left  = todos.length - done;

  document.getElementById('stat-total').textContent = todos.length;
  document.getElementById('stat-done').textContent  = done;
  document.getElementById('stat-left').textContent  = left;

  if (todos.length === 0) {
    emptyEl.style.display = '';
    return;
  }
  emptyEl.style.display = 'none';

  // Render pending items first, then done
  const sorted = [
    ...todos.filter(t => !t.done),
    ...todos.filter(t =>  t.done)
  ];

  sorted.forEach(todo => {
    const card = document.createElement('div');
    card.className = 'todo-card' + (todo.done ? ' done' : '');
    card.dataset.id = todo.id;

    card.innerHTML = `
      <input type="checkbox" ${todo.done ? 'checked' : ''}
             onchange="toggleDone(${todo.id})" />
      <span class="todo-text">${escHtml(todo.text)}</span>
      <div class="todo-actions">
        <button class="icon-btn delete" onclick="deleteTodo(${todo.id})" title="Delete">🗑</button>
      </div>
    `;
    list.appendChild(card);
  });
}

// ══════════════════════════════════════════════════════════
//  Todo actions
// ══════════════════════════════════════════════════════════
async function sendTodo() {
  const input = document.getElementById('todo-input');
  const text  = input.value.trim();
  if (!text) { input.focus(); return; }

  const ok = await sendCommand('ADD:' + text);
  if (ok) {
    // Optimistically add to local list
    const id = Date.now();
    todos.push({ id, text, done: false });
    renderTodos();
    input.value = '';
    closePanel();
    toast('Task added ✓');
  }
}

async function toggleDone(id) {
  await sendCommand('DONE:' + id);
  const todo = todos.find(t => t.id === id);
  if (todo) { todo.done = !todo.done; renderTodos(); }
}

async function deleteTodo(id) {
  if (!confirm('Delete this task?')) return;
  const ok = await sendCommand('DEL:' + id);
  if (ok) {
    todos = todos.filter(t => t.id !== id);
    renderTodos();
    toast('Task deleted');
  }
}

// ══════════════════════════════════════════════════════════
//  Voice input — Web Speech API
// ══════════════════════════════════════════════════════════
let recognition = null;
let listening   = false;

function initSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast('Voice input not supported in this browser'); return null; }

  const r = new SR();
  r.lang            = 'en-US';
  r.interimResults  = true;   // show partial results in input field
  r.maxAlternatives = 1;
  r.continuous      = false;

  r.onstart = () => {
    listening = true;
    document.getElementById('voice-btn').classList.add('listening');
    document.getElementById('todo-input').placeholder = 'Listening…';
  };

  r.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    document.getElementById('todo-input').value = transcript;
    if (e.results[0].isFinal) {
      stopListening();
      // Auto-send after short delay so user can see the result
      setTimeout(sendTodo, 600);
    }
  };

  r.onerror = (e) => {
    stopListening();
    if (e.error !== 'no-speech') toast('Voice error: ' + e.error);
  };

  r.onend = () => stopListening();

  return r;
}

function stopListening() {
  listening = false;
  document.getElementById('voice-btn').classList.remove('listening');
  document.getElementById('todo-input').placeholder = 'What needs to be done?';
}

function toggleVoice() {
  if (!recognition) recognition = initSpeech();
  if (!recognition) return;

  if (listening) {
    recognition.stop();
  } else {
    document.getElementById('todo-input').value = '';
    recognition.start();
  }
}

// ══════════════════════════════════════════════════════════
//  Add panel (bottom sheet)
// ══════════════════════════════════════════════════════════
function togglePanel() {
  const panel = document.getElementById('add-panel');
  const fab   = document.getElementById('fab');
  const ov    = document.getElementById('overlay');

  const isOpen = panel.classList.contains('open');
  if (isOpen) {
    closePanel();
  } else {
    panel.classList.add('open');
    fab.classList.add('open');
    ov.classList.add('visible');
    setTimeout(() => document.getElementById('todo-input').focus(), 350);
  }
}

function closePanel() {
  document.getElementById('add-panel').classList.remove('open');
  document.getElementById('fab').classList.remove('open');
  document.getElementById('overlay').classList.remove('visible');
  if (listening && recognition) recognition.stop();
}

// ══════════════════════════════════════════════════════════
//  Toast notification
// ══════════════════════════════════════════════════════════
let toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ══════════════════════════════════════════════════════════
//  Helpers
// ══════════════════════════════════════════════════════════
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════════════════════════
//  Init
// ══════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  if (!navigator.bluetooth) {
    document.getElementById('connect-btn').textContent = 'BT unavailable';
    document.getElementById('connect-btn').disabled = true;
    toast('Open this page in Chrome on Android for BLE support.');
  }

  // Keyboard shortcut: Escape closes panel
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closePanel();
  });
});
</script>
</body>
</html>
